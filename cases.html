<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <title>Case Gallery – Ianne Atelier | Leather Restoration Before & After</title>

  <!-- SEO -->
  <meta name="description" content="Browse completed leather restoration cases by Ianne Atelier – cleaning, colour restore, edge oil, strap renewal and repair for luxury bags in Malaysia.">
  <link rel="canonical" href="https://ianneatelier.pages.dev/cases.html">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://ianneatelier.pages.dev/cases.html">
  <meta property="og:title"       content="Case Gallery – Ianne Atelier | Leather Restoration">
  <meta property="og:description" content="Browse completed leather restoration cases – cleaning, colour restore, edge oil, strap renewal and repair for luxury bags in Malaysia.">
  <meta property="og:image"       content="https://ianneatelier.pages.dev/assets/images/og-cover.webp">

  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="light-page">

<!-- ===== HEADER ===== -->
<header id="site-header">
  <div class="header-inner">
    <a href="index.html" class="brand">Ianne Atelier</a>
    <div class="header-actions">
      <a href="https://ig.me/m/ianneatelierbagspa"
         target="_blank"
         class="header-cta"
         aria-label="Contact via Instagram">
        <svg class="cta-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path fill="currentColor"
            d="M7 2C4.243 2 2 4.243 2 7v10c0 2.757 2.243 5 5 5h10c2.757 0 5-2.243 5-5V7c0-2.757-2.243-5-5-5H7zm10 2c1.654 0 3 1.346 3 3v10c0 1.654-1.346 3-3 3H7c-1.654 0-3-1.346-3-3V7c0-1.654 1.346-3 3-3h10zm-5 3a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6zm4.75-.75a1.25 1.25 0 11-2.5 0 1.25 1.25 0 012.5 0z"/>
        </svg>
      </a>
      <div class="lang-switch">
        <button id="btn-en">EN</button>
        <button id="btn-zh">中文</button>
      </div>
    </div>
  </div>
</header>

<!-- ===== PAGE HERO ===== -->
<div class="cases-hero reveal">
  <p class="section-label" id="cases-eyebrow">The Work</p>
  <h1 class="cases-hero-title" id="cases-title">Case Gallery</h1>
  <p class="cases-hero-sub" id="cases-sub">Select a service to explore our work</p>
</div>

<!-- ===== SERVICE PICKER ===== -->
<section class="service-picker">
  <div class="service-grid" id="service-grid"></div>
</section>

<!-- ===== FOOTER ===== -->
<footer>
  <div class="footer-inner">
    <p class="footer-brand">Ianne Atelier</p>
    <p class="footer-note">Luxury Leather Restoration<br>Kelantan, Malaysia</p>
  </div>
</footer>

<script src="./assets/js/cases.js"></script>
<script src="./assets/js/animation.js"></script>

<script>
  const SERVICES = [
    { key: "Cleaning",         en: "Cleaning",         zh: "清洗" },
    { key: "Colour Restore",   en: "Colour Restore",   zh: "补色" },
    { key: "Colour Touch-up",  en: "Colour Touch-up",  zh: "局部补色" },
    { key: "Edge Oil",         en: "Edge Oil",         zh: "边油修复" },
    { key: "Strap Renewal",    en: "Strap Renewal",    zh: "手提袋换新" },
    { key: "Repair & Restore", en: "Repair & Restore", zh: "修补修复" }
  ];

  let lang = localStorage.getItem("lang") || "en";

  function buildServiceGrid() {
    const grid = document.getElementById("service-grid");
    grid.innerHTML = "";

    SERVICES.forEach((svc, i) => {
      const count = Object.values(CASES).filter(c => c.service.en === svc.key).length;

      const card = document.createElement("a");
      card.className = "service-card reveal";
      card.style.transitionDelay = `${i * 0.07}s`;
      card.href = `cases-grid.html?service=${encodeURIComponent(svc.key)}`;

      card.innerHTML = `
        <span class="service-card-label">${svc[lang]}</span>
        <div class="service-card-footer">
          <span class="service-card-count" data-count="${count}">${count} ${lang === "en" ? "cases" : "案例"}</span>
          <span class="service-card-arrow" aria-hidden="true">→</span>
        </div>
      `;

      grid.appendChild(card);
    });

    document.querySelectorAll(".service-card.reveal").forEach(el => observeReveal(el));
  }

  function setLang(newLang) {
    lang = newLang;
    localStorage.setItem("lang", lang);

    document.getElementById("cases-title").textContent =
      lang === "en" ? "Case Gallery" : "案例展示";
    document.getElementById("cases-sub").textContent =
      lang === "en" ? "Select a service to explore our work" : "选择服务类别，探索我们的案例";

    document.getElementById("btn-en").classList.toggle("active", lang === "en");
    document.getElementById("btn-zh").classList.toggle("active", lang === "zh");

    document.querySelectorAll(".service-card").forEach((card, i) => {
      card.querySelector(".service-card-label").textContent = SERVICES[i][lang];
      const count = card.querySelector(".service-card-count").dataset.count;
      card.querySelector(".service-card-count").textContent =
        `${count} ${lang === "en" ? "cases" : "案例"}`;
    });
  }

  document.getElementById("btn-en").onclick = () => setLang("en");
  document.getElementById("btn-zh").onclick = () => setLang("zh");

  buildServiceGrid();
  setLang(lang);
</script>

<script>
  const siteHeader = document.getElementById("site-header");
  window.addEventListener("scroll", () => {
    siteHeader.classList.toggle("scrolled", window.scrollY > 64);
  }, { passive: true });
</script>

</body>
</html>
